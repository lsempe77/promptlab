# Roster of OpenRouter models to compare.
# Revised 2026-07-12: trimmed to 4 models for a clean fresh start.
# The 12-model roster was burning API credits cycling through fields that
# had already plateaued. 4 models (3 families) gives enough diversity for
# the cross-model generalization gate while keeping cost ~3x lower.
# Based on the 2026-07-12 supervisor run results:
#   gpt-mini-latest    -- best overall (84% sector_name with definitions)
#   gemini-flash-latest -- strongest extraction baseline (83% sector_name)
#   claude-haiku-latest -- solid second (82% sector_name)
#   deepseek-v4-flash  -- cross-family reference for the holdout gate

cheap:
  - "~openai/gpt-mini-latest"
  - "~anthropic/claude-haiku-latest"
  - "~google/gemini-flash-latest"
  - deepseek/deepseek-v4-flash
