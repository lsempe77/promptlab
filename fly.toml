# fly.toml app configuration file generated for dep-promptlab-api on 2026-07-04T23:40:06+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dep-promptlab-api'
primary_region = 'iad'

[build]

[env]
  DEP_DB_PATH = '/data/promptlab.db'
  DEP_MD_DIR = '/data/corpus'

[[mounts]]
  source = 'dep_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
